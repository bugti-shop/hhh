workflows:
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 90
    environment:
      xcode: 26.0          # Required: iOS 26 SDK mandate
      cocoapods: default
      node: 20
      npm: latest
      bun: latest
      vars:
        BUNDLE_ID: "com.flowist.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: ""   # fill from App Store Connect (numeric)
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.flowist.app

    scripts:
      - name: Install JS deps
        script: |
          bun install --frozen-lockfile || npm ci

      - name: Build web bundle
        script: |
          bun run build || npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod repo update
          pod install --repo-update

      - name: Set build number from Codemagic
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build & archive .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM.zip

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
