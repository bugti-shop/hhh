workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: v18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
    artifacts:
      - build/**/*.app
      - build/**/*.ipa
